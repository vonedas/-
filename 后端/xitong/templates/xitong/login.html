<!DOCTYPE html>
<html class="h-100" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <title>健行无忧 - 管理员登录</title>
    <link href="/static/houtai/static/css/style.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f3 100%);
        }
        .authincation-content {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-top: -60px;
        }
        .auth-form {
            padding: 40px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .auth-logo {
            width: 80px;
            height: auto;
            margin-bottom: 20px;
        }
        .auth-title {
            color: #2E4765;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .auth-subtitle {
            color: #6B8DE3;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            color: #2E4765;
            font-weight: 500;
            margin-bottom: 10px;
            display: block;
        }
        .form-control {
            height: 50px;
            border-radius: 10px;
            border: 2px solid #E4E8F3;
            padding: 0 20px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #6B8DE3;
            box-shadow: 0 0 0 3px rgba(107, 141, 227, 0.1);
        }
        .btn-primary {
            background: #6B8DE3;
            border: none;
            height: 50px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #5A7CD2;
            transform: translateY(-2px);
        }
        .health-decoration {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: #6B8DE3;
            border-radius: 0 0 50% 50%;
            z-index: -1;
        }
    </style>
</head>
<body class="h-100">
    <div class="health-decoration"></div>
    <div class="authincation h-100">
        <div class="container h-100">
            <div class="row justify-content-center h-100 align-items-center">
                <div class="col-md-6">
                    <div class="authincation-content">
                        <div class="row no-gutters">
                            <div class="col-xl-12">
                                <div class="auth-form">
                                    <div class="auth-header">
                                        <img src="/static/img/logo.png" alt="Logo" class="auth-logo">
                                        <h2 class="auth-title">健行无忧</h2>
                                        <p class="auth-subtitle">管理员登录</p>
                                    </div>
                                    <form action="{% url 'loginAndRegist:loginact' %}" method="post">
                                        <div class="form-group">
                                            <label><strong>账号</strong></label>
                                            <input class="form-control" name="username" placeholder="请输入管理员账号" type="text">
                                        </div>
                                        <div class="form-group">
                                            <label><strong>密码</strong></label>
                                            <input class="form-control" name="password" placeholder="请输入密码" type="password">
                                        </div>
                                        <input type="hidden" name="identity" value="管理员">
                                        <div class="text-center">
                                            <button class="btn btn-primary btn-block" type="submit">登录系统</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/houtai/static/js/global.min.js"></script>
    <script src="/static/houtai/static/js/custom.min.js"></script>
    <script src="/static/houtai/static/js/dlabnav-init.js"></script>
    <script>
        if ("") {
            alert("");
        }
    </script>
</body>
</html>
