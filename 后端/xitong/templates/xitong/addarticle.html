<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <title qw-c="operationname">添加文章</title>
    <!-- Favicon icon -->
    <!-- Custom Stylesheet -->
    <link href="/static/houtai/static/css/bootstrap-select.min.css" rel="stylesheet">
    <link href="/static/houtai/static/css/style.css" rel="stylesheet">
    <script src="/static/qianduan/js/jquery-3.5.1.slim.min.js"></script>
    <script src="/static/houtai/static/js/jquery.validate.min.js"></script>

    <link href="https://cdn.staticfile.org/wangeditor5/5.1.23/css/style.min.css" rel="stylesheet">
    <script src="https://cdn.staticfile.org/wangeditor5/5.1.23/index.min.js"></script>
</head>
<body>
<!--*******************
  Preloader start
********************-->
<div id="preloader">
    <div class="sk-three-bounce">
        <div class="sk-child sk-bounce1"></div>
        <div class="sk-child sk-bounce2"></div>
        <div class="sk-child sk-bounce3"></div>
    </div>
</div>
<!--*******************
  Preloader end
********************-->
<!--**********************************
  Main wrapper start
***********************************-->
<div id="main-wrapper">
    <!--**********************************
                 Nav header start
             ***********************************-->
    <div class="nav-header">
          <a class="brand-logo" href="#"> <span
                style="color: white; font-size: 30px;margin-left: 45px;white-space: nowrap">健康检测系统</span> </a>
        <div class="nav-control">
            <div class="hamburger">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </div>
        </div>
    </div>
    <!--**********************************
                 Nav header end
             ***********************************-->
    <!--**********************************
                 Header start
             ***********************************-->
    <div class="header">
        <div class="header-content">
            <nav class="navbar navbar-expand">
                <div class="collapse navbar-collapse justify-content-between">
                    <ul class="navbar-nav header-right">
                        <li class="nav-item dropdown notification_dropdown"><a class="nav-link bell ai-icon"
                                                                               data-toggle="dropdown" href="#"
                                                                               role="button">
                            <svg class="feather feather-bell" fill="none" height="20" id="icon-user"
                                 stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                 viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
                            </svg>
                        </a></li>
                    </ul>
                </div>
            </nav>
        </div>
    </div>
    <!--**********************************
                 Header end ti-comment-alt
             ***********************************-->
    <!--**********************************
                 Sidebar start
             ***********************************-->
    <div class="dlabnav">
        <div class="dlabnav-scroll">

            {% include "xitong/htmenu.html" %}

        </div>
    </div>
    <!--**********************************
                 Sidebar end
             ***********************************-->
    <!--**********************************
                 Content body start
             ***********************************-->
    <div class="content-body">
        <div class="container-fluid">
            <div class="row page-titles mx-0">
                <div class="col-sm-6 p-md-0">
                    <div class="welcome-text">
                        <h4 qw-c="operationname">添加文章</h4>
                    </div>
                </div>
            </div>
            <!-- row -->
            <div class="row">
                <div class="col-lg-12">
                    <div class="card" qw-c="pagecontent">
                        <div class="card-header">
                            <h4 class="card-title" qw-c="operationname">添加文章</h4>
                        </div>
                        <div class="card-body">
                            <div class="form-validation">
                                <form action="{% url 'article:addarticleact' %}" class="form-valide" method="post"
                                      qw-c="operationform" enctype="multipart/form-data">
                                    <div class="form-group row" qw-c="forminputcomponent">
                                        <label class="col-lg-4 col-form-label" for="val-username" qw-c="forminputtext">标题</label>
                                        <div class="col-lg-6">
                                            <!-- 定义title输入框 -->

                                            <input name="title" class="form-control" qw-c="forminput">
                                        </div>
                                    </div>
                                    <div class="form-group row" qw-c="forminputcomponent">
                                        <label class="col-lg-4 col-form-label" for="val-username" qw-c="forminputtext">封面图片</label>
                                        <div class="col-lg-6">
                                            <!-- 定义pic的文件选择框，并设置name为picfile-->

                                            <input type="file" name="picfile" class="form-control" qw-c="forminput"
                                                   accept="image/*">
                                            <small class="form-text text-muted">支持 jpg, png, gif 格式的图片</small>
                                        </div>
                                    </div>
                                    <div class="form-group row" qw-c="formtextareacomponent">
                                        <label class="col-lg-4 col-form-label" for="val-username"
                                               qw-c="formtextareatext">内容</label>
                                        <div class="col-lg-8">
                                            <!-- 富文本编辑器容器 -->
                                            <div style="border: 1px solid #ccc;">
                                                <!-- 工具栏容器 -->
                                                <div id="toolbar-container"></div>
                                                <!-- 编辑器容器 -->
                                                <div id="editor-container" style="min-height: 400px;"></div>
                                            </div>
                                            <!-- 隐藏的 textarea 用于提交表单 -->
                                            <textarea style="display: none;" name="content"
                                                      id="editor-content"></textarea>
                                        </div>
                                    </div>
                                    <div class="form-group row" qw-c="forminputcomponent">
                                        <label class="col-lg-4 col-form-label" for="val-username" qw-c="forminputtext">发布时间</label>
                                        <div class="col-lg-6">
                                            <!-- 将id为dangqianshijian的项内容设置为当前时间-->

                                            <script>
                                                $(function () {
                                                    document.getElementById("dangqianshijian").value = new Date(+new Date() + 8 * 3600 * 1000).toJSON().substr(0, 19).replace("T", " ");
                                                })
                                            </script>
                                            <!-- 定义id为dangqianshijian的input输入框，并设置为只读-->

                                            <input readonly type="text" id="dangqianshijian" name="addtime"
                                                   class="form-control" qw-c="forminput">
                                        </div>
                                    </div>
                                    <div class="form-group row" qw-c="forminputcomponent">
                                        <label class="col-lg-4 col-form-label" for="val-username" qw-c="forminputtext">浏览量</label>
                                        <div class="col-lg-6">
                                            <!-- 定义clicknum数字输入框-->

                                            <input type="number" name="clicknum" class="form-control" qw-c="forminput"
                                                   value="0">
                                        </div>
                                    </div>
                                    <div class="form-group row" qw-c="formselectcomponent">
                                        <label class="col-lg-4 col-form-label" for="val-username" qw-c="formselecttext">文章分类</label>
                                        <div class="col-lg-6">
                                            <!-- 定义文章分类下拉框 -->

                                            <select id='articletype' onchange="articletypechange(this)"
                                                    name="articletype" class="form-control" qw-c="formselect">
                                                {% for articletype in articletypeall %}
                                                    <option value='{{ articletype.name }}'>{{ articletype.name }}</option>

                                                {% endfor %}                                                </select>
                                            <script>
                                                function GetQueryString(name) {
                                                    var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
                                                    var r = decodeURIComponent(window.location.search.substr(1)).match(reg);
                                                    if (r != null) return (r[2]);
                                                    return null;
                                                }

                                                var articletype = GetQueryString("articletype");

                                                if (articletype != null) {

                                                    $("#articletype").val(articletype);

                                                    $("#articletype option:selected").siblings().remove();
                                                }

                                                function articletypechange() {

                                                    // 获取页面加载时的选中option的索引
                                                    var selectedIndex = $("#articletype").get(0).selectedIndex;

                                                    $("#articletypeid").val($("#articletypeid option:eq(" + selectedIndex + ")").val());

                                                }
                                            </script>
                                        </div>
                                    </div> <!-- 设置display为none,设置为不可见 -->

                                    <div style='display:none;' class="form-group row">
                                        <div class="col-lg-6">
                                            <!-- 定义文章分类id下拉框 -->

                                            <select id='articletypeid' name="articletypeid" class="form-control">
                                                {% for articletype in articletypeall %}
                                                    <option value='{{ articletype.id }}'>{{ articletype.id }}</option>

                                                {% endfor %}                                                </select>
                                            <script>
                                                function GetQueryString(name) {
                                                    var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
                                                    var r = decodeURIComponent(window.location.search.substr(1)).match(reg);
                                                    if (r != null) return (r[2]);
                                                    return null;
                                                }

                                                var articletypeid = GetQueryString("articletypeid");

                                                if (articletypeid != null) {

                                                    $("#articletypeid").val(articletypeid);

                                                    $("#articletypeid option:selected").siblings().remove();
                                                }

                                            </script>
                                        </div>
                                    </div>


                                    <div class="form-group row">
                                        <div class="col-lg-8 ml-auto">
                                            <button class="btn btn-primary" qw-c="operationbutton"
                                                    type="submit" onclick="return submitForm()">添加
                                            </button>
                                        </div>
                                    </div>

                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!--**********************************
                 Content body end
             ***********************************-->
    <!--**********************************
                 Footer start
             ***********************************-->
    <div class="footer">
        <div class="copyright">
            <p>健康检测系统</p>
        </div>
    </div>
    <!--**********************************
                 Footer end
             ***********************************-->
    <!--**********************************
                Support ticket button start
             ***********************************-->
    <!--**********************************
                Support ticket button end
             ***********************************-->
</div>
<!--**********************************
  Main wrapper end
***********************************-->
<!--**********************************
  Scripts
***********************************-->
<!-- Required vendors -->
<script src="/static/houtai/static/js/global.min.js"></script>
<script src="/static/houtai/static/js/bootstrap-select.min.js"></script>
<script src="/static/houtai/static/js/custom.min.js"></script>
<script src="/static/houtai/static/js/dlabnav-init.js"></script>
<!-- Jquery Validation -->


<!-- Svganimation scripts -->
<script src="/static/houtai/static/js/vivus.min.js"></script>
<script src="/static/houtai/static/js/svg.animation.js"></script>
<script src="/static/houtai/static/js/styleSwitcher.js"></script>
<script>
    if ("") {
        alert("");
    }
</script>
<script>
    // 初始化编辑器
    const {createEditor, createToolbar} = window.wangEditor

    const editorConfig = {
        placeholder: '请输入内容...',
        onChange(editor) {
            const html = editor.getHtml()
            document.getElementById('editor-content').value = html
        },
        MENU_CONF: {
            uploadImage: {
                // 自定义图片上传
                customUpload(file, insertFn) {
                    const formData = new FormData()
                    formData.append('image', file)
                    formData.append('csrfmiddlewaretoken', '{{ csrf_token }}')

                    fetch('/article/upload/', {
                        method: 'POST',
                        body: formData
                    })
                        .then(response => response.json())
                        .then(data => {
                            if (data.errno === 0) {
                                // 修改这里，添加完整的域名路径
                                const fullUrl = 'http://localhost:8000' + data.data.url
                                insertFn(fullUrl)
                            } else {
                                console.error('上传失败:', data.message)
                                alert('图片上传失败: ' + data.message)
                            }
                        })
                        .catch(error => {
                            console.error('上传出错:', error)
                            alert('图片上传出错')
                        })
                },
                // 阻止 wangEditor 自带的图片上传
                server: '',
            }
        }
    }

    // 创建编辑器
    const editor = createEditor({
        selector: '#editor-container',
        html: '<p><br></p>',
        config: editorConfig,
        mode: 'default'
    })

    // 工具栏配置
    const toolbarConfig = {
        toolbarKeys: [
            'headerSelect',
            '|',
            'bold',
            'italic',
            'underline',
            'through',
            'color',
            'bgColor',
            '|',
            'fontSize',
            'fontFamily',
            'lineHeight',
            '|',
            'bulletedList',
            'numberedList',
            'todo',
            '|',
            'justifyLeft',
            'justifyCenter',
            'justifyRight',
            '|',
            'insertLink',
            'uploadImage',  // 使用默认的上传图片按钮
            'insertTable',
            '|',
            'undo',
            'redo'
        ]
    }

    // 创建工具栏
    const toolbar = createToolbar({
        editor,
        selector: '#toolbar-container',
        config: toolbarConfig,
        mode: 'default'
    })

    // 表单提交前的处理
    function submitForm() {
        const html = editor.getHtml()
        document.getElementById('editor-content').value = html
        return true
    }

    // 设置当前时间
    $(function () {
        document.getElementById("dangqianshijian").value = new Date(+new Date() + 8 * 3600 * 1000).toJSON().substr(0, 19).replace("T", " ");
    })
</script>

<style>
    /* 工具栏样式 */
    #toolbar-container {
        border-bottom: 1px solid #ccc;
    }

    /* 编辑器容器样式 */
    #editor-container {
        height: 400px;
        background-color: #fff;
    }

    /* 工具栏按钮样式 */
    .w-e-bar-item {
        margin-right: 5px;
    }

    .w-e-bar-item button {
        padding: 5px 10px;
    }

    /* 编辑区域样式 */
    .w-e-text-container {
        height: 400px !important;
    }
</style>
</body>
</html>
