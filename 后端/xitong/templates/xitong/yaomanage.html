<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <title qw-c="operationname">吃药提醒管理</title>
    <!-- Favicon icon -->
    <!-- Custom Stylesheet -->
    <link href="/static/houtai/static/css/bootstrap-select.min.css" rel="stylesheet">
    <link href="/static/houtai/static/css/style.css" rel="stylesheet">
    <link href="https://www.17sucai.com/table-bootstrap-basic.html" rel="canonical">
    <link href="/static/houtai/css/css-sheep.css" rel="stylesheet" type="text/css">
</head>
<body>
<!--*******************
  Preloader start
********************-->
<div id="preloader">
    <div class="sk-three-bounce">
        <div class="sk-child sk-bounce1"></div>
        <div class="sk-child sk-bounce2"></div>
        <div class="sk-child sk-bounce3"></div>
    </div>
</div>
<!--*******************
  Preloader end
********************-->
<!--**********************************
  Main wrapper start
***********************************-->
<div id="main-wrapper">
    <!--**********************************
                 Nav header start
             ***********************************-->
    <div class="nav-header">
          <a class="brand-logo" href="#"> <span
                style="color: white; font-size: 30px;margin-left: 45px;white-space: nowrap">健康检测系统</span> </a>
        <div class="nav-control">
            <div class="hamburger">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </div>
        </div>
    </div>
    <!--**********************************
                 Nav header end
             ***********************************-->
    <!--**********************************
                 Header start
             ***********************************-->
    <div class="header">
        <div class="header-content">
            <nav class="navbar navbar-expand">
                <div class="collapse navbar-collapse justify-content-between">
                    <ul class="navbar-nav header-right">
                        <li class="nav-item dropdown notification_dropdown"><a class="nav-link bell ai-icon"
                                                                               data-toggle="dropdown" href="#"
                                                                               role="button">
                            <svg class="feather feather-bell" fill="none" height="20" id="icon-user"
                                 stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                 viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
                            </svg>
                        </a></li>
                    </ul>
                </div>
            </nav>
        </div>
    </div>
    <!--**********************************
                 Header end ti-comment-alt
             ***********************************-->
    <!--**********************************
                 Sidebar start
             ***********************************-->
    <div class="dlabnav">
        <div class="dlabnav-scroll">

            {% include "xitong/htmenu.html" %}

        </div>
    </div>
    <!--**********************************
                 Sidebar end
             ***********************************-->
    <!--**********************************
                 Content body start
             ***********************************-->
    <div class="content-body">
        <div class="container-fluid">
            <div class="row page-titles mx-0">
                <div class="col-sm-6 p-md-0">
                    <div class="welcome-text">
                        <h4 qw-c="operationname">吃药提醒管理</h4>
                    </div>
                </div>
            </div>
            <!-- row -->
            <div class="row">
                <div class="col-lg-12">
                    <div class="card">
                        <div class="card-header">
                            <h4 class="card-title" qw-c="operationname">吃药提醒管理</h4>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <form action="#" class="form-search" id="searchform" method="post">
                                    <div class="row">
                                        <span class="left-ipt">关键词</span>
                                        <input class="form-control form-control-ipt" id="search">
                                        <button class="btn btn-primary" id="searchbtn">搜索</button>
                                    </div>
                                </form>
                                <table class="table table-responsive-sm" qw-c="table">
                                    <thead>
                                    <td>标题
                                    </td>
                                    <td>用户
                                    </td>
                                    <td>时间
                                    </td>
                                    <td>操作</td>
                                    </thead>
                                    <tbody>


                                    {% for yao in yaoall %}
                                        <tr>
                                            <td>{{ yao.name | safe }}</td>
                                            <td>{{ yao.user | safe }}</td>
                                            <td>{{ yao.shijian | safe }}</td>
                                            <td>

                                                <!--  定义修改吃药提醒按钮和删除吃药提醒按钮，修改提交地址为/yao/updateyao/{{ yao.id }}，删除提交地址为 /yao/deleteyaoact/{{ yao.id }}-->

                                                <a qw-c="tableupdatea" href="/yao/updateyao/{{ yao.id }}">修改</a> <a
                                                    qw-c="tabledeletea" href="/yao/deleteyaoact/{{ yao.id }}">删除</a>

                                            </td>
                                        </tr>
                                    {% endfor %}                  </tbody>
                                </table>
                                <div style="margin-top: 30px;text-align: right">
                                    <div id="tempStr1"></div>
                                    <div style="line-height: 70px;height:70px;">
                                        <a class="btn btn-primary" href="#" id="shangyiye">上一页</a>
                                        <a class="btn btn-primary" href="#" id="dangqianye">1</a>
                                        <a class="btn btn-primary" href="#" id="xiayiye">下一页</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!--**********************************
                 Content body end
             ***********************************-->
    <div class="footer">
        <div class="copyright">
            <p>健康检测系统</p>
        </div>
    </div>
</div>
<!--**********************************
  Main wrapper end
***********************************-->
<!--**********************************
  Scripts
***********************************-->
<!-- Required vendors -->
<script src="/static/houtai/static/js/global.min.js"></script>
<script src="/static/houtai/static/js/bootstrap-select.min.js"></script>
<script src="/static/houtai/static/js/custom.min.js"></script>
<script src="/static/houtai/static/js/dlabnav-init.js"></script>
<!-- Svganimation scripts -->
<script src="/static/houtai/static/js/vivus.min.js"></script>
<script src="/static/houtai/static/js/svg.animation.js"></script>
<script src="/static/houtai/static/js/styleSwitcher.js"></script>
<script src="/static/houtai/js/JavaScript-js.js" type="text/javascript"></script>
<script>
    if ("") {
        alert("");
    }
</script>
</body>
</html>
