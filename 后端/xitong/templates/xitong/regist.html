<!doctype html>
<html class="h-100" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <title qw-c="operationname">注册</title>
    <!-- Favicon icon -->
    <link href="/static/houtai/static/css/style.css" rel="stylesheet">
    <link href="https://www.17sucai.com/page-login.html" rel="canonical">
</head>
<body class="h-100">
<div class="authincation h-100">
    <div class="container h-100">
        <div class="row justify-content-center h-100 align-items-center">
            <div class="col-md-6">
                <div class="authincation-content">
                    <div class="row no-gutters">
                        <div class="col-xl-12">
                            <div class="auth-form">
                                <h4 class="text-center mb-4" qw-c="operationname">注册</h4>
                                <form action="{% url 'loginAndRegist:registact' %}" qw-c="form" method="post">
                                    <div class="form-group">
                                        <label><strong>账号</strong></label>
                                        <input class="form-control" name="username" placeholder="请输入用户名" qw-c="username"
                                               type="text">
                                    </div>
                                    <div class="form-group">
                                        <label><strong>密码</strong></label>
                                        <input class="form-control" name="password" placeholder="请输入密码" qw-c="password"
                                               type="password">
                                    </div>


                                    <div class="form-group" qw-c="passwordcomponent"><label>确认密码</label> <input
                                            class="form-control" id="repassword" name="repassword" placeholder="请确认密码"
                                            qw-c="password" type="password"></div>


                                    <div class="form-group">
                                        <label>身份</label>
                                        <select class="form-control" name="identity" qw-c="identity">
                                            <option>用户</option>
                                            <option>子女</option>
                                        </select>
                                    </div>
                                    <div class="text-center">
                                        <button class="btn btn-primary btn-block" qw-c="operationbutton" type="submit">
                                            注册
                                        </button>
                                    </div>
                                    <a qw-c="infotext">已有账号，点击<a href="{% url 'loginAndRegist:login' %}">登录</a></a>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!--**********************************
  Scripts
***********************************-->
<!-- Required vendors -->
<script src="/static/houtai/static/js/global.min.js"></script>
<script src="/static/houtai/static/js/bootstrap-select.min.js"></script>
<script src="/static/houtai/static/js/custom.min.js"></script>
<script src="/static/houtai/static/js/dlabnav-init.js"></script>
<script>
    if ("") {
        alert("");
    }
</script>
</body>
</html>
