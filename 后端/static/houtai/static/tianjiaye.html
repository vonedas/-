<body>

********************-->

<div class="sk-three-bounce">

<div class="sk-child sk-bounce2"></div>
<div class="sk-child sk-bounce3"></div>
</div>
</div>
<!--*******************

********************-->
<!--**********************************

***********************************-->
<div id="main-wrapper">
<!--**********************************

        ***********************************-->
<div class="nav-header">
<a class="brand-logo" href="index.html">
<span style="color: white; font-size: 30px;margin-left: 45px;">健康检测系统</span>
</a>
<div class="nav-control">
<div class="hamburger">
<span class="line"></span><span class="line"></span><span class="line"></span>
</div>
</div>
</div>
<!--**********************************
            Nav header end
        ***********************************-->
<!--**********************************
            Header start
        ***********************************-->
<div class="header">
<div class="header-content">
<nav class="navbar navbar-expand">
<div class="collapse navbar-collapse justify-content-between">
<ul class="navbar-nav header-right">
<li class="nav-item dropdown notification_dropdown">
<a class="nav-link bell ai-icon" data-toggle="dropdown" href="#" role="button">
<svg class="feather feather-bell" fill="none" height="20" id="icon-user" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
</svg>
</a>
</li>
</ul>
</div>
</nav>
</div>
</div>
<!--**********************************
            Header end ti-comment-alt
        ***********************************-->
<!--**********************************
            Sidebar start
        ***********************************-->
<div class="dlabnav">
<div class="dlabnav-scroll">
<ul class="metismenu" id="menu" qw-c="menu">
<li qw-c="menuitem"><a aria-expanded="false" class="has-arrow" href="javascript:void()">
<i class="la la-home"></i>
<span class="nav-text" qw-c="menuitematext">母菜单</span>
</a>
<ul aria-expanded="false" qw-c="menuitemselect">
<li qw-c="menuitemselectitem"><a href="index.html" qw-c="menuitemselectitema menuitemselectitematext">子菜单</a></li>
</ul>
</li>
</ul>
</div>
</div>
<!--**********************************
            Sidebar end
        ***********************************-->
<!--**********************************
            Content body start
        ***********************************-->
<div class="content-body">
<div class="container-fluid">
<div class="row page-titles mx-0">
<div class="col-sm-6 p-md-0">
<div class="welcome-text">
<h4 qw-c="operationname">添加页</h4>
</div>
</div>
</div>
<!-- row -->
<div class="row">
<div class="col-lg-12">
<div class="card" qw-c="pagecontent">
<div class="card-header">
<h4 class="card-title" qw-c="operationname">添加页</h4>
</div>
<div class="card-body">
<div class="form-validation">
<form action="#" class="form-valide" method="post" qw-c="operationform">
<div class="row">
<div class="col-xl-6">
<div class="form-group row" qw-c="forminputcomponent">
<label class="col-lg-4 col-form-label" for="val-username" qw-c="forminputtext">账号
                                                    <span class="text-danger">*</span>
</label>
<div class="col-lg-6">
<input class="form-control" id="val-username" name="val-username" placeholder="Enter a username.." qw-c="forminput" type="text"/>
</div>
</div>
<div class="form-group row" qw-c="formtextareacomponent">
<label class="col-lg-4 col-form-label" for="val-username" qw-c="formtextareatext">账号
                                                    <span class="text-danger">*</span>
</label>
<div class="col-lg-6">
<textarea class="form-control" qw-c="formtextarea"></textarea>
</div>
</div>
<div class="form-group row" qw-c="formselectcomponent">
<label class="col-lg-4 col-form-label" for="val-username" qw-c="formselecttext">账号
                                                    <span class="text-danger">*</span>
</label>
<div class="col-lg-6">
<select class="form-control" qw-c="formselect"></select>
</div>
</div>
<div class="form-group row">
<div class="col-lg-8 ml-auto">
<button class="btn btn-primary" qw-c="operationbutton" type="submit">提交
                                                    </button>
</div>
</div>
</div>
</div>
</form>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
<!--**********************************
            Content body end
        ***********************************-->
<!--**********************************
            Footer start
        ***********************************-->
<div class="footer">
<div class="copyright">
<p>健康检测系统</p>
</div>
</div>

</div>
